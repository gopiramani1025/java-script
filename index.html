<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator.css">
    <title>task-3</title>
</head>
</head>

<body>
    <div class="container">
        <div class="inner-box">
            <div class="left-side">
                <div class="left-header">
                    <h1>Mortgage Calculator</h1>
                    <p class="clear-all-text">Clear All</p>
                </div>
                <form action="#">
                    <div class="input-group">
                        <label for="mortgage-amount">Mortgage Amount</label>
                        <span class="input-group-text" id="basic">£</span>
                        <input type="text" id="mortgage-amount" name="mortgage-amount" value="300">
                    </div>
                    <div class="input-group">
                        <div class="half-input-container">
                            <div class="half-input">
                                <label for="mortgage-term">Mortgage Term</label>
                                <span class="input-group-text1" id="year">Year</span>
                                <input type="text" id="mortgage-term" name="mortgage-term">
                            </div>
                            <div class="half-input">
                                <label for="interest-rate">Interest Rate</label>
                                <span class="input-group-text2" id="basic2">%</span>
                                <input type="text" id="interest-rate" name="interest-rate">
                            </div>
                        </div>
                    </div>
                    <div class="input-group radio-group">
                        <label>Mortgage Type</label>
                        <div class="radio-option">
                            <input type="radio" id="fixed-rate" name="mortgage-type" value="fixed" checked>
                            <label for="fixed-rate">Fixed Rate</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="variable-rate" name="mortgage-type" value="variable">
                            <label for="variable-rate">Variable Rate</label>
                        </div>
                    </div>
                    <div class="button">
                        <button type="submit"> <img src="img/icon-calculator.svg" class="img">Calculate Repayments</button>
                    </div>
                </form>
            </div>
            <div class="right-side">
                <div class="cotainer">
                    <h1 class="input-text-result">Your results</h1>
                    <p class="input-text-paragraph">Your results are shown below based on the information you prowided.
                        To
                        adjust the results, edit the form and click "calculate repayment" again.</p>
                </div>
                <div class="container-box">
                    <p class="input-text-repayment">Your monthly repayments</p>
                    <h1 class="input-text-amount">£1,797.74</h1>

                    <p class="input-text-term">Total you'll repay over the term</p>
                    <h2 class="input-text-amount2">£539,322.94</h2>

                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
